name: 🌤️ Weather Butler - AI Weather Assistant

on:
  schedule:
    # 仅在 8:00 和 13:00 北京时间运行（恶劣天气会在脚本内实时推送）
    # 北京时间 = UTC+8，所以 8:00 = 0:00 UTC，13:00 = 5:00 UTC
    - cron: '0 0,5 * * *'
  workflow_dispatch:
    # 支持手动触发，方便测试

env:
  # 时区设置（用于日志时间显示）
  TZ: Asia/Shanghai

jobs:
  weather-butler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: 🌤️ 天气管家监测

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: .github/workflows/requirements.txt

      - name: 📦 安装依赖
        run: |
          pip install -r .github/workflows/requirements.txt --quiet

      - name: 🌤️ 运行天气管家
        run: |
          python .github/workflows/weather_runner.py
        env:
          # OpenWeatherMap 多 Key 轮询（用逗号分隔）
          API_KEYS: ${{ secrets.API_KEYS }}
          # 位置（Secrets，加密存储）
          LAT: ${{ secrets.LAT }}
          LON: ${{ secrets.LON }}
          LOCATION_NAME: ${{ secrets.LOCATION_NAME }}
          # 语言和单位
          LANG: zh_cn
          UNITS: metric
          # Bark 推送（iPhone 通知）
          BARK_KEY: ${{ secrets.BARK_KEY }}
          # OpenRouter AI（天气管家智能分析）
          OPENROUTER_API_BASE: ${{ secrets.OPENROUTER_API_BASE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          # 调试模式（设为 true 可看到详细日志）
          DEBUG: 'false'
